<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script>
    var saved = localStorage.getItem('preferred-lang');
    var browser = (navigator.language || 'it').toLowerCase().startsWith('it') ? 'it' : 'en';
    var lang = saved || browser;
    window.location.replace('/' + lang + '/404.html');
  </script>
</head>
<body></body>
</html>
